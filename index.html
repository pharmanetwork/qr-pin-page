<script>
function checkPin() {
  let pin = document.getElementById("pin").value;

  if(pin === "3289") {

    // petit effet avant redirection
    document.getElementById("result").innerHTML = "✔ Accès validé...";
    
    setTimeout(() => {
      window.location.href = "success.html";
    }, 800);

  } else {
    document.getElementById("result").innerHTML = "❌ Code incorrect";
  }
}
</script>
