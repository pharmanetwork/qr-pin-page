<button onclick="checkPin()">Valider</button>
  <p id="result"></p>
  <div id="secret" class="secret"></div>
</div>

<script>
function checkPin() {
  var pin = document.getElementById("pin").value;

  if(pin === "3289") {
    document.getElementById("result").innerHTML = "✅ Accès autorisé";
    document.getElementById("secret").innerHTML = "🎉 Bienvenue ! Contenu débloqué.";
  } else {
    document.getElementById("result").innerHTML = "❌ Code incorrect";
    document.getElementById("secret").innerHTML = "";
  }
}
</script>

</body>
</html>
