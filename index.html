<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accès sécurisé</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 80px;
  background: #0f172a;
  color: white;
}
.box {
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  display: inline-block;
}
input {
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}
button {
  padding: 12px 20px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
.secret {
  margin-top: 20px;
  font-size: 20px;
  color: #4ade80;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔒 Accès sécurisé</h2>
  <input type="password" id="pin" placeholder="Entrer le code">
  <br><br>
  <button onclick="checkPin()">Valider</button>
  <p id="result"></p>
  <div id="secret" class="secret"></div>
</div>

<script>
function checkPin() {
  var pin = document.getElementById("pin").value;

  if(pin === "3289") {
    document.getElementById("result").innerHTML = "✅ Accès autorisé";
    document.getElementById("secret").innerHTML = "🔓 Accès validé ! Contenu débloqué.";
  } else {
    document.getElementById("result").innerHTML = "❌ Code incorrect";
    document.getElementById("secret").innerHTML = "";
  }
}
</script>

</body>
</html>
