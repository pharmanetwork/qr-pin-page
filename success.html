<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Access Granted</title>

<style>
body {
  margin: 0;
  background: black;
  color: #22c55e;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.box {
  animation: fadeIn 1s ease-in-out;
}

h1 {
  font-size: 40px;
  letter-spacing: 3px;
}

p {
  font-size: 18px;
  color: #aaa;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  cursor: pointer;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="box">
  <h1>ACCESS GRANTED</h1>
  <p>Welcome to the secure area</p>

  <button onclick="window.location.href='index.html'">
    LOG OUT
  </button>
</div>

</body>
</html>
